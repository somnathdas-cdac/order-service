name: CI/CD Pipeline to Oracle Cloud VM

on:
  push:
    branches:
      - main # Triggers when code is pushed to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_USERNAME }}/order-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (to copy docker-compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to Oracle VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/order-service-deployment/"

      - name: SSH into Oracle VM and Deploy System
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ~/order-service-deployment/
            # Log in to Docker Hub on the remote VM
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            # Pull the latest application image
            docker compose pull order-service
            # Re-launch containers in background mode
            docker compose up -d --remove-orphans

